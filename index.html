<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Faccine - Database</title>
    <style>
        body { background: #0a0a0a; color: #e0e0e0; font-family: Arial, sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 { color: #00ffff; text-align: center; margin-bottom: 30px; }
        .stats { background: #1a1a2e; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: flex; gap: 20px; }
        .stat { color: #00ffff; font-weight: bold; }
        table { width: 100%; background: #1a1a2e; border-radius: 10px; overflow: hidden; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #0f3460; font-size: 14px; }
        th { background: #0f3460; color: #00ffff; position: sticky; top: 0; }
        tr:hover { background: #16213e; }
        .loading { text-align: center; padding: 40px; color: #00ffff; }
        .error { color: #e94560; text-align: center; padding: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🕵️‍♀️ Team Faccine Database</h1>
        <div class="stats">
            <span class="stat">Всего: <span id="total">0</span></span>
            <span class="stat">Показано: <span id="visible">0</span></span>
        </div>
        <div id="tableContainer" class="loading">Загрузка данных...</div>
    </div>

    <script>
        async function loadData() {
            try {
                const response = await fetch('database.csv');
                const text = await response.text();
                
                // Простой парсер CSV с обработкой кавычек
                function parseCSV(csv) {
                    const rows = [];
                    let currentRow = [], currentCell = '', inQuotes = false;
                    
                    for (let i = 0; i < csv.length; i++) {
                        const char = csv[i];
                        const nextChar = csv[i + 1];
                        
                        if (char === '"') {
                            if (inQuotes && nextChar === '"') { currentCell += '"'; i++; }
                            else { inQuotes = !inQuotes; }
                        }
                        else if (char === ',' && !inQuotes) {
                            currentRow.push(currentCell.trim());
                            currentCell = '';
                        }
                        else if ((char === '\n' || char === '\r') && !inQuotes) {
                            if (currentCell || currentRow.length) {
                                currentRow.push(currentCell.trim());
                                if (currentRow.some(c => c)) rows.push(currentRow);
                                currentRow = []; currentCell = '';
                            }
                            if (char === '\r' && nextChar === '\n') i++;
                        }
                        else { currentCell += char; }
                    }
                    if (currentCell || currentRow.length) {
                        currentRow.push(currentCell.trim());
                        if (currentRow.some(c => c)) rows.push(currentRow);
                    }
                    return rows;
                }
                
                const data = parseCSV(text);
                if (data.length < 2) throw new Error('Нет данных');
                
                const headers = data[0];
                const rows = data.slice(1);
                
                document.getElementById('total').textContent = rows.length;
                document.getElementById('visible').textContent = rows.length;
                
                let html = '<table><thead><tr>';
                headers.forEach(h => html += `<th>${h}</th>`);
                html += '</tr></thead><tbody>';
                
                rows.forEach(row => {
                    html += '<tr>';
                    for (let i = 0; i < headers.length; i++) {
                        const cell = row[i] || '';
                        // Обрезаем длинные тексты
                        const display = cell.length > 100 ? cell.substring(0, 100) + '...' : cell;
                        html += `<td>${display}</td>`;
                    }
                    html += '</tr>';
                });
                
                html += '</tbody></table>';
                document.getElementById('tableContainer').innerHTML = html;
                
            } catch (e) {
                console.error(e);
                document.getElementById('tableContainer').innerHTML = 
                    '<p class="error">⚠️ Ошибка: ' + e.message + '<br><small>Проверьте консоль (F12) для деталей</small></p>';
            }
        }
        loadData();
    </script>
</body>
</html>
