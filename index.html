<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🕵️♀️ Team Faccine - Database Investigativo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            line-height: 1.6;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            border: 2px solid #0f3460;
            box-shadow: 0 8px 32px rgba(0, 255, 255, 0.1);
        }

        h1 {
            color: #00ffff;
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
        }

        .subtitle {
            color: #e94560;
            font-size: 1.1em;
        }

        .search-box {
            background: #1a1a2e;
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 25px;
            border: 1px solid #0f3460;
        }

        #searchInput {
            width: 100%;
            padding: 15px;
            font-size: 16px;
            border: 2px solid #0f3460;
            border-radius: 8px;
            background: #16213e;
            color: #fff;
            transition: all 0.3s;
        }

        #searchInput:focus {
            outline: none;
            border-color: #00ffff;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
        }

        .filters {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }

        .filter-group {
            background: #1a1a2e;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #0f3460;
        }

        .filter-group label {
            display: block;
            color: #00ffff;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .filter-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #0f3460;
            border-radius: 6px;
            background: #16213e;
            color: #fff;
            cursor: pointer;
        }

        .stats {
            background: #16213e;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
            border: 1px solid #0f3460;
        }

        .stat-item {
            color: #e94560;
            font-weight: bold;
        }

        .stat-value {
            color: #00ffff;
            font-size: 1.3em;
        }

        .table-container {
            background: #1a1a2e;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid #0f3460;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: linear-gradient(135deg, #0f3460 0%, #16213e 100%);
        }

        th {
            padding: 18px 12px;
            text-align: left;
            color: #00ffff;
            font-weight: 600;
            cursor: pointer;
            user-select: none;
            transition: background 0.3s;
            border-bottom: 2px solid #e94560;
        }

        th:hover {
            background: #1a1a2e;
        }

        th.sortable::after {
            content: ' ⇅';
            opacity: 0.5;
        }

        td {
            padding: 15px 12px;
            border-bottom: 1px solid #0f3460;
            color: #e0e0e0;
        }

        tbody tr {
            transition: all 0.3s;
        }

        tbody tr:hover {
            background: #16213e;
            transform: translateX(5px);
        }

        tbody tr:nth-child(even) {
            background: rgba(255, 255, 255, 0.02);
        }

        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
        }

        .badge-whatsapp { background: #25D366; color: #000; }
        .badge-email { background: #e94560; color: #fff; }
        .badge-sms { background: #0f3460; color: #00ffff; }
        .badge-telefonata { background: #533483; color: #fff; }

        .loading {
            text-align: center;
            padding: 50px;
            color: #00ffff;
            font-size: 1.2em;
        }

        .no-results {
            text-align: center;
            padding: 40px;
            color: #e94560;
            font-size: 1.1em;
        }

        @media (max-width: 768px) {
            .table-container {
                overflow-x: auto;
            }
            
            table {
                min-width: 800px;
            }
            
            h1 {
                font-size: 1.8em;
            }
        }

        .export-btn {
            background: linear-gradient(135deg, #e94560 0%, #0f3460 100%);
            color: #fff;
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            margin-bottom: 20px;
            transition: transform 0.3s;
        }

        .export-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(233, 69, 96, 0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🕵️‍♀️ Team Faccine</h1>
            <p class="subtitle">Database Investigativo - Le Indagini delle Faccine 🇮🇹</p>
        </header>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="🔍 Cerca in tutto il database...">
        </div>

        <div class="filters">
            <div class="filter-group">
                <label> Canale</label>
                <select id="filterCanale">
                    <option value="">Tutti i canali</option>
                </select>
            </div>
            <div class="filter-group">
                <label>🏢 Azienda</label>
                <select id="filterAzienda">
                    <option value="">Tutte le aziende</option>
                </select>
            </div>
            <div class="filter-group">
                <label>📅 Anno</label>
                <select id="filterAnno">
                    <option value="">Tutti gli anni</option>
                </select>
            </div>
        </div>

        <div class="stats">
            <div class="stat-item">Totale Casi: <span class="stat-value" id="totalCases">0</span></div>
            <div class="stat-item">Visualizzati: <span class="stat-value" id="visibleCases">0</span></div>
        </div>

        <button class="export-btn" onclick="exportToCSV()">📥 Esporta CSV</button>

        <div class="table-container">
            <table id="dataTable">
                <thead>
                    <tr>
                        <th class="sortable" data-column="nome">Nome</th>
                        <th class="sortable" data-column="id">ID</th>
                        <th class="sortable" data-column="data">Data</th>
                        <th>Descrizione</th>
                        <th>Valutazione Giuridica</th>
                        <th class="sortable" data-column="canale">Canale</th>
                        <th>Contatto</th>
                        <th>Danno Subìto</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="8" class="loading">⏳ Caricamento dati...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let allData = [];
        let filteredData = [];

        // Carica i dati dal CSV
        async function loadData() {
            try {
                const response = await fetch('database.csv');
                const csvText = await response.text();
                allData = parseCSV(csvText);
                filteredData = [...allData];
                
                populateFilters();
                renderTable();
                updateStats();
            } catch (error) {
                console.error('Errore nel caricamento:', error);
                document.getElementById('tableBody').innerHTML = 
                    '<tr><td colspan="8" class="no-results">Errore nel caricamento dei dati</td></tr>';
            }
        }

        function parseCSV(csv) {
            const lines = csv.split('\n').filter(line => line.trim());
            const headers = lines[0].split(',').map(h => h.trim().replace(/"/g, ''));
            
            return lines.slice(1).map(line => {
                const values = line.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g) || line.split(',');
                const obj = {};
                headers.forEach((header, index) => {
                    obj[header] = values[index] ? values[index].replace(/"/g, '').trim() : '';
                });
                return obj;
            }).filter(obj => Object.values(obj).some(v => v));
        }

        function populateFilters() {
            const canali = [...new Set(allData.map(d => d.CANALE).filter(Boolean))];
            const aziende = [...new Set(allData.map(d => d.NOME).filter(Boolean))];
            const anni = [...new Set(allData.map(d => {
                if (d.Data) {
                    const date = new Date(d.Data);
                    return !isNaN(date) ? date.getFullYear().toString() : null;
                }
                return null;
            }).filter(Boolean))];

            const selectCanale = document.getElementById('filterCanale');
            const selectAzienda = document.getElementById('filterAzienda');
            const selectAnno = document.getElementById('filterAnno');

            canali.forEach(c => {
                const option = document.createElement('option');
                option.value = c;
                option.textContent = c;
                selectCanale.appendChild(option);
            });

            aziende.forEach(a => {
                const option = document.createElement('option');
                option.value = a;
                option.textContent = a;
                selectAzienda.appendChild(option);
            });

            anni.sort().reverse().forEach(a => {
                const option = document.createElement('option');
                option.value = a;
                option.textContent = a;
                selectAnno.appendChild(option);
            });
        }

        function renderTable() {
            const tbody = document.getElementById('tableBody');
            
            if (filteredData.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" class="no-results">Nessun risultato trovato</td></tr>';
                return;
            }

            tbody.innerHTML = filteredData.map(row => `
                <tr>
                    <td><strong>${row.NOME || ''}</strong></td>
                    <td>${row.ID || ''}</td>
                    <td>${formatDate(row.Data)}</td>
                    <td>${row['Descrizione dell\'evento'] || ''}</td>
                    <td>${row['Valutazione Giuridica'] || ''}</td>
                    <td>${row.CANALE ? `<span class="badge badge-${row.CANALE.toLowerCase()}">${row.CANALE}</span>` : ''}</td>
                    <td>${row.CONTATTO || ''}</td>
                    <td>${row['Danno subìto'] || ''}</td>
                </tr>
            `).join('');
        }

        function formatDate(dateString) {
            if (!dateString) return '';
            const date = new Date(dateString);
            return isNaN(date) ? dateString : date.toLocaleDateString('it-IT');
        }

        function updateStats() {
            document.getElementById('totalCases').textContent = allData.length;
            document.getElementById('visibleCases').textContent = filteredData.length;
        }

        function filterData() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const filterCanale = document.getElementById('filterCanale').value;
            const filterAzienda = document.getElementById('filterAzienda').value;
            const filterAnno = document.getElementById('filterAnno').value;

            filteredData = allData.filter(row => {
                const matchesSearch = Object.values(row).some(val => 
                    val && val.toString().toLowerCase().includes(searchTerm)
                );
                const matchesCanale = !filterCanale || row.CANALE === filterCanale;
                const matchesAzienda = !filterAzienda || row.NOME === filterAzienda;
                const matchesAnno = !filterAnno || (row.Data && new Date(row.Data).getFullYear().toString() === filterAnno);

                return matchesSearch && matchesCanale && matchesAzienda && matchesAnno;
            });

            renderTable();
            updateStats();
        }

        function exportToCSV() {
            const headers = ['NOME', 'ID', 'Data', 'Descrizione dell\'evento', 'Valutazione Giuridica', 'CANALE', 'CONTATTO', 'Danno subìto'];
            const csvContent = [
                headers.join(','),
                ...filteredData.map(row => headers.map(h => `"${row[h] || ''}"`).join(','))
            ].join('\n');

            const blob = new Blob(['\ufeff' + csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'team-faccine-database.csv';
            link.click();
        }

        // Event Listeners
        document.getElementById('searchInput').addEventListener('input', filterData);
        document.getElementById('filterCanale').addEventListener('change', filterData);
        document.getElementById('filterAzienda').addEventListener('change', filterData);
        document.getElementById('filterAnno').addEventListener('change', filterData);

        // Sorting
        document.querySelectorAll('.sortable').forEach(th => {
            th.addEventListener('click', () => {
                const column = th.dataset.column;
                const keyMap = {
                    'nome': 'NOME',
                    'id': 'ID',
                    'data': 'Data',
                    'canale': 'CANALE'
                };
                const sortKey = keyMap[column];
                
                filteredData.sort((a, b) => {
                    const aVal = a[sortKey] || '';
                    const bVal = b[sortKey] || '';
                    return aVal.localeCompare(bVal, 'it');
                });
                
                renderTable();
            });
        });

        // Init
        loadData();
    </script>
</body>
</html>
