<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Vika's Singing Space</title>
<style>
  body { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: 'Arial Black', sans-serif; display: flex; flex-direction: column; height: 100vh; }
  #uiPanel { height: 85px; background: rgba(20, 20, 20, 0.95); border-bottom: 2px solid #333; display: flex; justify-content: space-around; align-items: center; padding: 0 5px; z-index: 10; }
  .bookmarkBtn { font-size: 36px; cursor: pointer; transition: 0.2s; -webkit-tap-highlight-color: transparent; border-radius: 12px; padding: 5px; display: flex; align-items: center; justify-content: center; min-width: 42px; background: #1a1a1a; }
  .btn-abc { background: #ff00ff; color: white; }
  .btn-123 { background: #00ff00; color: black; }
  .btn-fruit { background: #ffd700; }
  .bookmarkBtn:active { transform: scale(1.2); }
  .bookmarkBtn.active { outline: 3px solid #fff; box-shadow: 0 0 20px #fff; }
  #gameZone { flex-grow: 1; position: relative; width: 100%; touch-action: none; overflow: hidden; }
  canvas { display: block; width: 100%; height: 100%; }
</style>
</head>
<body>

<div id="uiPanel">
  <div class="bookmarkBtn active" onclick="changeMode('all', this)">🌟</div>
  <div class="bookmarkBtn" onclick="changeMode('berry', this)">🍓</div>
  <div class="bookmarkBtn btn-fruit" onclick="changeMode('fruit', this)">🟡</div>
  <div class="bookmarkBtn" onclick="changeMode('veggie', this)">🥦</div>
  <div class="bookmarkBtn btn-abc" onclick="changeMode('abc', this)">А</div>
  <div class="bookmarkBtn btn-123" onclick="changeMode('123', this)">1+</div>
  <div class="bookmarkBtn" onclick="changeMode('animal', this)">🐶</div>
  <div class="bookmarkBtn" onclick="changeMode('bird', this)">🐥</div>
  <div class="bookmarkBtn" onclick="changeMode('flower', this)">🌸</div>
  <div class="bookmarkBtn" onclick="changeMode('galaxy', this)">🪐</div>
</div>

<div id="gameZone"><canvas id="popCanvas"></canvas></div>

<script>
// --- ЗВУКОВОЙ ДВИЖОК ---
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playPopSound() {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(800, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.1);
  gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + 0.1);
}

function playClickSound() {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'triangle';
  osc.frequency.setValueAtTime(150, audioCtx.currentTime);
  gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
  gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.05);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + 0.05);
}

// --- ИГРОВАЯ ЛОГИКА ---
const canvas = document.getElementById('popCanvas');
const ctx = canvas.getContext('2d');
let gW, gH;
const gZone = document.getElementById('gameZone');

function resize() { gW = gZone.offsetWidth; gH = gZone.offsetHeight; canvas.width = gW; canvas.height = gH; }
window.addEventListener('resize', resize);
resize();

const library = {
  berry: ['🍓', '🍇', '🍒', '🍉', '🫐'],
  fruit: ['🍌', '🍍', '🍑', '🍊', '🍐', '🍋'],
  veggie: ['🥦', '🥕', '🌽', '🍅', '🥒'],
  abc: ['А','Б','В','A','B','C','Ā','Č','Ģ','Ä','Ö','Ü','ß'],
  123: ['1','2','3','4','5','6','7','8','9','0','+','-','=','∞'],
  animal: ['🐶', '🐱', '🦁', '🧸', '🦄', '🐘', '🐒', '🦒'],
  bird: ['🐥', '🦉', '🦜', '🐧', '🦢'],
  flower: ['🌸', '🌺', '🌻', '🌹', '🌷', '🌼']
};

const realPlanets = [{p:'🌍'}, {p:'🪐'}, {p:'🔴'}, {p:'⚪️'}, {p:'🟣'}, {p:'🟠'}];
let currentMode = 'all';
let currentItems = [].concat(...Object.values(library));
let cosmicObjects = [];
let stars = [];

for(let i=0; i<80; i++) stars.push({ x: Math.random()*2000, y: Math.random()*2000, s: Math.random()*2, h: Math.random()*360 });

class CosmicObject {
  constructor() { this.reset(); this.y = Math.random() * gH; }
  reset() {
    this.r = 60 + Math.random() * 30;
    this.x = Math.random() * gW;
    this.y = gH + this.r + Math.random() * 150;
    this.speed = 1 + Math.random() * 1.5;
    this.hue = Math.random() * 360;
    this.isBubble = (currentMode !== 'galaxy');
    if (this.isBubble) {
      this.content = currentItems[Math.floor(Math.random() * currentItems.length)];
    } else {
      this.content = realPlanets[Math.floor(Math.random() * realPlanets.length)].p;
      this.speed *= 0.6;
    }
  }
  draw() {
    ctx.save();
    ctx.translate(this.x, this.y);
    let grad = ctx.createRadialGradient(-this.r*0.3, -this.r*0.3, this.r*0.1, 0, 0, this.r);
    if (this.isBubble) {
      grad.addColorStop(0, '#fff'); grad.addColorStop(0.3, `hsla(${this.hue}, 90%, 65%, 0.4)`); grad.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.beginPath(); ctx.arc(0, 0, this.r, 0, Math.PI*2); ctx.fillStyle = grad; ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.2)'; ctx.stroke();
    } else {
      grad.addColorStop(0, `hsla(${this.hue}, 50%, 80%, 0.4)`); grad.addColorStop(1, 'rgba(0,0,0,0.1)');
      ctx.beginPath(); ctx.arc(0, 0, this.r, 0, Math.PI*2); ctx.fillStyle = grad; ctx.fill();
    }
    ctx.font = `bold ${this.r * 0.9}px Arial`; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillStyle = '#fff'; ctx.fillText(this.content, 0, 0);
    ctx.restore();
  }
  update() { this.y -= this.speed; if (this.y < -this.r*2) this.reset(); }
}

function changeMode(mode, el) {
  if (audioCtx.state === 'suspended') audioCtx.resume();
  playClickSound();
  currentMode = mode;
  currentItems = mode === 'all' ? [].concat(...Object.values(library)) : library[mode];
  cosmicObjects.forEach(obj => obj.reset());
  document.querySelectorAll('.bookmarkBtn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
}

function init() {
  cosmicObjects = [];
  for (let i = 0; i < 11; i++) cosmicObjects.push(new CosmicObject());
}

function animate() {
  ctx.fillStyle = '#000'; ctx.fillRect(0,0,gW,gH);
  ctx.fillStyle = '#fff';
  stars.forEach(s => {
    ctx.globalAlpha = Math.sin(Date.now()*0.001 + s.h)*0.3 + 0.7;
    ctx.beginPath(); ctx.arc(s.x % gW, s.y % gH, s.s, 0, Math.PI*2); ctx.fill(); ctx.globalAlpha = 1;
  });
  cosmicObjects.forEach(obj => { obj.update(); obj.draw(); });
  requestAnimationFrame(animate);
}

function pop(x, y) {
  if (audioCtx.state === 'suspended') audioCtx.resume();
  if (currentMode === 'galaxy') return;
  cosmicObjects.forEach(obj => {
    if (Math.hypot(obj.x - x, obj.y - (y - 85)) < obj.r + 10) {
      playPopSound();
      obj.reset();
    }
  });
}

gameZone.addEventListener('touchstart', (e) => { Array.from(e.touches).forEach(t => pop(t.clientX, t.clientY)); }, {passive:true});
gameZone.addEventListener('mousedown', (e) => pop(e.clientX, e.clientY));

init(); animate();
</script>
</body>
</html>
